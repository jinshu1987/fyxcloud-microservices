apiVersion: apps/v1
kind: Deployment
metadata:
  name: scanner-service
  namespace: fyxcloud
  labels:
    app: scanner-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: scanner-service
  template:
    metadata:
      labels:
        app: scanner-service
    spec:
      containers:
        - name: scanner-service
          image: fyxcloud/scanner-service:latest
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: fyxcloud-config
            - secretRef:
                name: fyxcloud-secrets
          env:
            - name: PORT
              value: "3002"
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: scanner-service
  namespace: fyxcloud
spec:
  selector:
    app: scanner-service
  ports:
    - port: 3002
      targetPort: 3002
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scanner-hpa
  namespace: fyxcloud
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scanner-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
