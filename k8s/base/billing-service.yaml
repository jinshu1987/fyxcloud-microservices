apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: fyxcloud
  labels:
    app: billing-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
    spec:
      containers:
        - name: billing-service
          image: fyxcloud/billing-service:latest
          ports:
            - containerPort: 3005
          envFrom:
            - configMapRef:
                name: fyxcloud-config
            - secretRef:
                name: fyxcloud-secrets
          env:
            - name: PORT
              value: "3005"
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
  namespace: fyxcloud
spec:
  selector:
    app: billing-service
  ports:
    - port: 3005
      targetPort: 3005
