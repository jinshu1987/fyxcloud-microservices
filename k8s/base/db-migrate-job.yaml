apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: fyxcloud
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: fyxcloud/auth-service:latest
          command: ["node", "-e", "import('./dist/migrate.js').then(m => m.runMigrations()).then(() => process.exit(0)).catch(e => { console.error(e); process.exit(1); })"]
          envFrom:
            - secretRef:
                name: fyxcloud-secrets
