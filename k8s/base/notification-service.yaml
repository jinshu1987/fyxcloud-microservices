apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: fyxcloud
  labels:
    app: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: fyxcloud/notification-service:latest
          ports:
            - containerPort: 3004
          envFrom:
            - configMapRef:
                name: fyxcloud-config
            - secretRef:
                name: fyxcloud-secrets
          env:
            - name: PORT
              value: "3004"
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: fyxcloud
spec:
  selector:
    app: notification-service
  ports:
    - port: 3004
      targetPort: 3004
