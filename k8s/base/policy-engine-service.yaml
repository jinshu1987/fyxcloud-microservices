apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-engine-service
  namespace: fyxcloud
  labels:
    app: policy-engine-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: policy-engine-service
  template:
    metadata:
      labels:
        app: policy-engine-service
    spec:
      containers:
        - name: policy-engine-service
          image: fyxcloud/policy-engine-service:latest
          ports:
            - containerPort: 3003
          envFrom:
            - configMapRef:
                name: fyxcloud-config
            - secretRef:
                name: fyxcloud-secrets
          env:
            - name: PORT
              value: "3003"
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: policy-engine-service
  namespace: fyxcloud
spec:
  selector:
    app: policy-engine-service
  ports:
    - port: 3003
      targetPort: 3003
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: policy-engine-hpa
  namespace: fyxcloud
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: policy-engine-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
